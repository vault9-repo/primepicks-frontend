<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PrimePicks Soccer Tips</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body style="margin:0;padding:0;font-family:Arial,sans-serif;
  background:url('images/background.PNG') no-repeat center center fixed;
  background-size:cover;color:white;">

  <!-- Hero -->
  <section class="flex flex-col items-center justify-center text-center px-6 py-24 bg-black bg-opacity-50">
    <h1 class="text-4xl md:text-5xl font-bold mb-4 leading-snug">
      <span class="text-green-400">PrimePicks</span> 
      <span class="text-red-400">Soccer</span> <br/>
      <span class="text-green-400">Tips</span> for 
      <span class="text-red-400">Winning Edge</span>
    </h1>
    <p class="text-lg mb-6">Join our premium community for profitable betting tips.</p>
    <button onclick="alert('📲 Mobile App download coming soon!')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg">Download Mobile App</button>
  </section>

  <!-- Subscriptions -->
  <section class="py-16 px-6 bg-black bg-opacity-70 text-center">
    <h2 class="text-3xl font-bold mb-8">⭐ Premium Plans</h2>
    <div class="grid md:grid-cols-4 gap-6 max-w-6xl mx-auto">

      <div class="bg-white bg-opacity-20 rounded-2xl shadow-lg p-6">
        <h3 class="text-xl font-bold mb-2">Daily Tips</h3>
        <p class="text-3xl text-green-400 font-bold mb-4">Ksh 49</p>
        <button onclick="subscribe('daily')" class="bg-green-600 px-6 py-2 rounded-lg">Subscribe</button>
      </div>

      <div class="bg-white bg-opacity-20 rounded-2xl shadow-lg p-6 border-2 border-yellow-400">
        <h3 class="text-xl font-bold mb-2">Weekly Tips</h3>
        <p class="text-3xl text-yellow-400 font-bold mb-4">Ksh 199</p>
        <button onclick="subscribe('weekly')" class="bg-yellow-500 px-6 py-2 rounded-lg">Subscribe</button>
      </div>

      <div class="bg-white bg-opacity-20 rounded-2xl shadow-lg p-6">
        <h3 class="text-xl font-bold mb-2">Monthly Tips</h3>
        <p class="text-3xl text-blue-400 font-bold mb-4">Ksh 399</p>
        <button onclick="subscribe('monthly')" class="bg-blue-600 px-6 py-2 rounded-lg">Subscribe</button>
      </div>

      <div class="bg-white bg-opacity-20 rounded-2xl shadow-lg p-6 border-2 border-red-400">
        <h3 class="text-xl font-bold mb-2">Jackpot</h3>
        <p class="text-3xl text-red-400 font-bold mb-4">Ksh 1000</p>
        <button onclick="subscribe('jackpot')" class="bg-red-600 px-6 py-2 rounded-lg">Subscribe</button>
      </div>

    </div>
  </section>

  <!-- Jackpot Bets -->
  <section class="py-16 px-6 bg-black bg-opacity-50 text-center">
    <h2 class="text-3xl font-bold mb-6">📊 Jackpot Bets</h2>
    <div class="overflow-x-auto">
      <table class="border border-gray-500 mx-auto max-w-xl w-full text-left">
        <thead>
          <tr class="bg-gray-800">
            <th class="px-2 py-1 border border-gray-500">Match</th>
            <th class="px-2 py-1 border border-gray-500">Prediction</th>
            <th class="px-2 py-1 border border-gray-500">Date</th>
          </tr>
        </thead>
        <tbody id="betsBody">
          <tr><td colspan="3" class="text-center py-3">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- Yesterday’s Premium Tips -->
  <section class="p-6 bg-black bg-opacity-60">
    <h2 class="text-2xl font-bold mb-4 text-center">📅 Yesterday’s Premium Tips</h2>
    <div class="grid md:grid-cols-3 gap-6 max-w-6xl mx-auto">
      <div class="p-4 shadow rounded bg-transparent flex-shrink-0"><img src="./images/tip1.PNG" class="rounded-lg mb-2 cursor-pointer zoomable w-full"></div>
      <div class="p-4 shadow rounded bg-transparent flex-shrink-0"><img src="./images/tip2.PNG" class="rounded-lg mb-2 cursor-pointer zoomable w-full"></div>
      <div class="p-4 shadow rounded bg-transparent flex-shrink-0"><img src="./images/tip3.PNG" class="rounded-lg mb-2 cursor-pointer zoomable w-full"></div>
    </div>
  </section>

  <!-- News slideshow -->
  <section class="p-6 bg-black bg-opacity-60">
    <h2 class="text-2xl font-bold mb-4 text-center">📰 Latest News</h2>
    <div id="news-slideshow" class="flex space-x-6 overflow-hidden">
      <div class="p-4 shadow rounded bg-transparent flex-shrink-0"><img src="./images/news2.PNG" class="rounded-lg mb-2 cursor-pointer zoomable w-64"></div>
      <div class="p-4 shadow rounded bg-transparent flex-shrink-0"><img src="./images/news3.PNG" class="rounded-lg mb-2 cursor-pointer zoomable w-64"></div>
      <div class="p-4 shadow rounded bg-transparent flex-shrink-0"><img src="./images/news4.PNG" class="rounded-lg mb-2 cursor-pointer zoomable w-64"></div>
      <div class="p-4 shadow rounded bg-transparent flex-shrink-0"><img src="./images/news5.PNG" class="rounded-lg mb-2 cursor-pointer zoomable w-64"></div>
    </div>
  </section>

  <!-- Zoom modal -->
  <div id="imageModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50">
    <span id="closeModal" class="absolute top-4 right-6 text-white text-3xl cursor-pointer">&times;</span>
    <img id="modalImage" class="max-w-[90%] max-h-[90%] rounded-lg shadow-lg">
  </div>

<script>
  const API_BASE = window.location.hostname.includes("localhost") 
    ? "http://localhost:5000" 
    : "https://primepicks-backend.onrender.com";

  function subscribe(plan) {
    const email = prompt("Enter your email:");
    if (!email) return;

    let amount = {daily:49,weekly:199,monthly:399,jackpot:1000}[plan] * 100;

    const handler = PaystackPop.setup({
      key: "pk_test_aa6debf75dbee2c9c5ec4aaaf61f0996ba13e17e",
      email: email,
      amount: amount,
      currency: "KES",
      callback: function(response) {
        fetch(API_BASE + "/api/subscriptions/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ reference: response.reference, plan, email })
        })
        .then(r => r.json())
        .then(d => {
          if (d.success) { alert("✅ Subscription active!"); }
          else { alert("❌ Payment verification failed."); }
        });
      },
      onClose: () => alert("❌ Payment cancelled.")
    });
    handler.openIframe();
  }

  async function loadBets() {
    const res = await fetch(API_BASE + "/api/bets");
    const bets = await res.json();
    const tbody = document.getElementById("betsBody");
    tbody.innerHTML = "";
    bets.forEach(b => {
      tbody.innerHTML += `<tr>
        <td class="px-4 py-2 border">${b.match}</td>
        <td class="px-4 py-2 border">${b.prediction}</td>
        <td class="px-4 py-2 border">${b.date}</td>
      </tr>`;
    });
  }
  window.onload = loadBets;

  // ---------------- SLIDESHOW ----------------
  const slideshow = document.getElementById("news-slideshow");
  let scrollAmount = 0;
  setInterval(() => {
    if (!slideshow) return;
    const card = slideshow.querySelector("div");
    if (!card) return;
    const slideWidth = card.offsetWidth + 24;
    scrollAmount += slideWidth;
    if (scrollAmount >= slideshow.scrollWidth - slideshow.clientWidth) scrollAmount = 0;
    slideshow.scrollTo({ left: scrollAmount, behavior: "smooth" });
  }, 3000);

  // ---------------- IMAGE ZOOM ----------------
  document.querySelectorAll(".zoomable").forEach(img => {
    img.addEventListener("click", () => {
      const modal = document.getElementById("imageModal");
      modal.classList.remove("hidden");
      document.getElementById("modalImage").src = img.src;
    });
  });
  document.getElementById("closeModal").addEventListener("click", () => {
    document.getElementById("imageModal").classList.add("hidden");
  });
</script>

</body>
</html>
